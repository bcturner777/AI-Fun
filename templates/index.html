<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistral Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #e94560;
        }

        #new-chat-btn {
            padding: 6px 14px;
            background: transparent;
            color: #e94560;
            border: 1px solid #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s, color 0.2s;
        }

        #new-chat-btn:hover {
            background: #e94560;
            color: #fff;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 720px;
            width: fit-content;
            padding: 10px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        #input-area {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }

        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }

        #message-input:focus {
            border-color: #e94560;
        }

        #send-btn {
            padding: 10px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #c73650;
        }

        #send-btn:disabled {
            background: #533;
            cursor: not-allowed;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mistral Chat</h1>
        <button id="new-chat-btn">New Chat</button>
    </header>

    <div id="chat-container">
        <div class="empty-state" id="empty-state">Send a message to start chatting</div>
    </div>

    <div id="input-area">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const messageInput = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const newChatBtn = document.getElementById("new-chat-btn");
        const emptyState = document.getElementById("empty-state");

        let history = [];
        let sending = false;

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(role, content) {
            if (emptyState) emptyState.remove();
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || sending) return;

            sending = true;
            sendBtn.disabled = true;
            messageInput.value = "";
            messageInput.style.height = "auto";

            addMessage("user", text);
            const assistantDiv = addMessage("assistant", "");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, history: history }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const payload = line.slice(6);

                        if (payload === "[DONE]") continue;

                        try {
                            const data = JSON.parse(payload);
                            if (data.error) {
                                assistantDiv.textContent = `Error: ${data.error}`;
                                break;
                            }
                            fullResponse += data.token;
                            assistantDiv.textContent = fullResponse;
                            scrollToBottom();
                        } catch (e) {
                            // skip malformed JSON
                        }
                    }
                }

                if (fullResponse) {
                    history.push({ role: "user", content: text });
                    history.push({ role: "assistant", content: fullResponse });
                }
            } catch (err) {
                assistantDiv.textContent = `Connection error: ${err.message}`;
            }

            sending = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);

        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener("input", () => {
            messageInput.style.height = "auto";
            messageInput.style.height = messageInput.scrollHeight + "px";
        });

        newChatBtn.addEventListener("click", () => {
            history = [];
            chatContainer.innerHTML = '<div class="empty-state" id="empty-state">Send a message to start chatting</div>';
            messageInput.focus();
        });

        messageInput.focus();
    </script>
</body>
</html>
